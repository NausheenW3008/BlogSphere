<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post - BlogSphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #F4C0D1 0%, #FAEEDA 100%);
    }
    header {
      background: linear-gradient(90deg, #D4537E, #ED93B1);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { color: white; font-size: 1.3rem; }
    .nav-links a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      margin-left: 16px;
      font-size: 14px;
    }
    .nav-links a:hover { color: white; }
    main {
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #FBEAF0;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 560px;
      border: 1px solid #ED93B1;
      box-shadow: 0 8px 32px rgba(212,83,126,0.15);
    }
    h2 { color: #72243E; font-size: 1.5rem; margin-bottom: 24px; }
    label {
      display: block;
      font-size: 13px;
      color: #993556;
      font-weight: bold;
      margin-bottom: 6px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #ED93B1;
      background: #F4C0D1;
      color: #72243E;
      font-size: 14px;
      outline: none;
      margin-bottom: 18px;
      transition: border 0.3s;
      font-family: Arial, sans-serif;
    }
    input[type="text"]:focus, textarea:focus { border-color: #D4537E; }
    textarea { height: 140px; resize: vertical; }
    .upload-box {
      border: 2px dashed #D4537E;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      background: #F4C0D1;
      color: #993556;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 18px;
      cursor: pointer;
    }
    input[type="file"] { display: none; }
    #preview img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 18px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(90deg, #D4537E, #EF9F27);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,83,126,0.4); }
  </style>
</head>
<body>
  <header>
    <h1>BlogSphere</h1>
    <div class="nav-links">
      <a href="post1.html">Feed</a>
      <a href="profile.html">Profile</a>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>Create a New Post 🌸</h2>
      <form id="blogForm">
        <label>Title</label>
        <input type="text" id="title" placeholder="Enter your blog title" required>

        <label>Content</label>
        <textarea id="content" placeholder="Write your blog here..." required></textarea>

        <label>Upload Image</label>
        <div class="upload-box" onclick="document.getElementById('image').click()">
          Click to upload an image 📷
        </div>
        <input type="file" id="image" accept="image/*">
        <div id="preview"></div>

        <button type="submit" class="btn">Submit Post</button>
      </form>
    </div>
  </main>

  <script>
    const token = localStorage.getItem("token");
    const username = localStorage.getItem("username");
    if (!token) { alert("Please login first!"); window.location.href = "login2.html"; }

    document.getElementById("image").addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          document.getElementById("preview").innerHTML =
            `<img src="${e.target.result}">`;
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById("blogForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();
      const imageFile = document.getElementById("image").files[0];
      if (!title || !content) { alert("Please fill in title and content!"); return; }
      const formData = new FormData();
      formData.append("title", title);
      formData.append("content", content);
      if (imageFile) formData.append("image", imageFile);
      try {
        const response = await fetch("https://blogsphere-backend-al6x.onrender.com/blogs", {
          method: "POST",
          body: formData
        });
        if (response.ok) {
          alert("Post created successfully! 🎉");
          window.location.href = "post1.html";
        } else {
          const err = await response.json();
          alert("Error: " + err.error);
        }
      } catch (error) {
        alert("Could not connect to server!");
      }
    });
  </script>
</body>
</html>
