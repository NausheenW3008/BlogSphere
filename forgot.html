<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(160deg, #F4C0D1 0%, #FAEEDA 100%);
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: #FBEAF0;
  border-radius: 16px;
  padding: 36px 32px;
  width: 340px;
  border: 1px solid #ED93B1;
  box-shadow: 0 8px 32px rgba(212,83,126,0.15);
}

h2 {
  text-align: center;
  color: #72243E;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 16px;
}

.input-group input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1.5px solid #ED93B1;
  background: #F4C0D1;
  color: #72243E;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(90deg, #D4537E, #EF9F27);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.bottom-link {
  text-align: center;
  margin-top: 15px;
}
.bottom-link a {
  color: #D4537E;
  text-decoration: none;
}
</style>
</head>

<body>
<div class="card">
  <h2>Forgot Password 🔐</h2>

  <form id="forgotForm">
    <div class="input-group">
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <button class="btn">Send Reset Link</button>
  </form>

  <div class="bottom-link">
    <a href="login2.html">Back to Login</a>
  </div>
</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;

  const res = await fetch("https://blogsphere-backend-al6x.onrender.com/forgot-password", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();
  alert(data.message || data.error);
});
</script>

</body>
</html>
