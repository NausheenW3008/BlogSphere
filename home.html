<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogSphere</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ed94da;
            background-image: url(backgroundpic2.jpeg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .buttons {
            margin-top: 20px;
        }

        .buttons button {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 10px 30px;
            margin: 0 15px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .buttons button:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }

        .illustration {
            margin-top: 30px;
        }

        .illustration img {
            width: auto;
            max-width: 400px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            margin-bottom: 10px;
        }

        /* ===== HOME PAGE ANIMATIONS ===== */

        .container {
            animation: fadeSlideUp 1s ease forwards;
        }

        .title {
            animation: glowText 2s ease-in-out infinite alternate;
        }

        .buttons button {
            position: relative;
            overflow: hidden;
        }

        .buttons button::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            transition: 0.4s;
        }

        .buttons button:hover::after {
            left: 100%;
        }

        .illustration img {
            animation: floatImage 3s ease-in-out infinite;
        }

        /* Keyframes */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowText {
            from {
                text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            }

            to {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            }
        }

        @keyframes floatImage {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }
    </style>
    <script src="script.js"></script>
</head>

<body>
    <div class="container">
        <div class="logo">BLOGSPHERE</div>
        <div class="title">Share your Thoughts with us</div>
        <div class="buttons">
            <a href="login2.html"><button>Log In</button></a>
            <a href="signup1.html"><button>Sign Up</button></a>
        </div>
        <div class="illustration">
            <img src="phone.png" alt="Illustration of people interacting">
        </div>
    </div>
</body>

</html>
