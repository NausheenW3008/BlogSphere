<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlogSphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #D4537E 0%, #ED93B1 50%, #EF9F27 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      color: white;
      padding: 40px 20px;
      animation: fadeUp 1s ease forwards;
    }
    .logo {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.85);
      margin-bottom: 16px;
    }
    .title {
      font-size: 2.8rem;
      font-weight: bold;
      margin-bottom: 12px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
      animation: glow 2s ease-in-out infinite alternate;
    }
    .subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.85);
      margin-bottom: 32px;
    }
    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .btn-outline {
      padding: 10px 32px;
      border-radius: 25px;
      border: 2px solid white;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
    .btn-solid {
      padding: 10px 32px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #993556;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    .btn-solid:hover { background: #FBEAF0; transform: translateY(-2px); }
    .illustration img {
      max-width: 320px;
      width: 100%;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow {
      from { text-shadow: 0 0 5px rgba(255,255,255,0.3); }
      to { text-shadow: 0 0 20px rgba(255,255,255,0.8); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">BLOGSPHERE</div>
    <div class="title">Share your Thoughts</div>
    <div class="subtitle">A colorful space for your stories, ideas and inspiration</div>
    <div class="buttons">
      <a href="login2.html" class="btn-outline">Log In</a>
      <a href="signup1.html" class="btn-solid">Sign Up</a>
    </div>
    <div class="illustration">
      <img src="phone.png" alt="Illustration">
    </div>
  </div>
</body>
</html>
