<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BlogSphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #F4C0D1 0%, #FAEEDA 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #FBEAF0;
      border-radius: 16px;
      padding: 36px 32px;
      width: 340px;
      border: 1px solid #ED93B1;
      box-shadow: 0 8px 32px rgba(212,83,126,0.15);
      animation: slideUp 0.7s ease forwards;
    }
    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4537E, #EF9F27);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      animation: pulse 2s infinite;
    }
    h2 {
      text-align: center;
      color: #72243E;
      font-size: 1.6rem;
      margin-bottom: 24px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: #993556;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #ED93B1;
      background: #F4C0D1;
      color: #72243E;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }
    .input-group input:focus { border-color: #D4537E; }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(90deg, #D4537E, #EF9F27);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,83,126,0.4); }
    .bottom-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #993556;
    }
    .bottom-link a { color: #D4537E; font-weight: bold; text-decoration: none; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(212,83,126,0.5); }
      70% { box-shadow: 0 0 0 12px rgba(212,83,126,0); }
      100% { box-shadow: 0 0 0 0 rgba(212,83,126,0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🌸</div>
    <h2>Welcome Back!</h2>
    <form id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="text" id="username" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Continue</button>
    </form>
    <div class="bottom-link">
      Don't have an account? <a href="signup1.html">Sign Up</a>
    </div>
    <div class="bottom-link">
  <a href="forgot.html">Forgot Password?</a>
</div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) { alert("Please fill in all fields!"); return; }
      try {
        const response = await fetch("http://localhost:5000/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("username", data.name);
          alert("Welcome back, " + data.name + "! 👋");
          window.location.href = "post1.html";
        } else {
          alert("Error: " + data.error);
        }
      } catch (error) {
        alert("Could not connect to server. Is your backend running?");
      }
    });
  </script>
</body>
</html>
