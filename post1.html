<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - BlogSphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #FBEAF0;
    }
    header {
      background: linear-gradient(90deg, #D4537E, #ED93B1);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { color: white; font-size: 1.3rem; }
    .nav-links { display: flex; align-items: center; gap: 16px; }
    .nav-links a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-size: 14px;
    }
    .nav-links a:hover { color: white; }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1.5px solid white;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.35); }
    main { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .top-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }
    .search-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 25px;
      border: 1.5px solid #ED93B1;
      background: #F4C0D1;
      color: #72243E;
      font-size: 14px;
      outline: none;
    }
    .search-input::placeholder { color: #993556; }
    .new-post-btn {
      padding: 10px 18px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(90deg, #D4537E, #EF9F27);
      color: white;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
    }
    .new-post-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,83,126,0.4); }
    .post-card {
      background: #F4C0D1;
      border-radius: 16px;
      border: 1px solid #ED93B1;
      overflow: hidden;
      margin-bottom: 24px;
      animation: fadeUp 0.5s ease forwards;
    }
    .post-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
    }
    .post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4537E, #EF9F27);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .post-meta { display: flex; flex-direction: column; }
    .post-username { font-size: 14px; font-weight: bold; color: #72243E; }
    .post-date { font-size: 11px; color: #993556; }
    .post-img img {
      width: 100%;
      display: block;
      max-height: none;
      object-fit: cover;
    }
    .post-body { padding: 12px 16px; }
    .post-title { font-size: 15px; font-weight: bold; color: #72243E; margin-bottom: 4px; }
    .post-content { font-size: 13px; color: #993556; line-height: 1.5; margin-bottom: 12px; }
    .post-actions { display: flex; gap: 10px; }
    .action-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #D4537E;
      background: #FBEAF0;
      color: #993556;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    .action-btn:hover { background: #D4537E; color: white; }
    .comments-section { margin-top: 12px; display: none; }
    .existing-comments p {
      background: #FBEAF0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: #72243E;
      margin-bottom: 6px;
    }
    .comment-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1.5px solid #ED93B1;
      background: #F4C0D1;
      color: #72243E;
      font-size: 13px;
      outline: none;
      margin-top: 6px;
      margin-bottom: 6px;
    }
    .add-comment-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(90deg, #D4537E, #EF9F27);
      color: white;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: #993556;
      font-size: 13px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>BlogSphere</h1>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="profile.html">Profile</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="top-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search posts..." onkeyup="searchPosts()">
      <a href="create_post.html" class="new-post-btn">+ New Post</a>
    </div>
    <div class="post-container"></div>
  </main>

  <footer>
    <p>© 2025 BlogSphere. Made with ❤️</p>
  </footer>

  <script>
    const token = localStorage.getItem("token");
    const username = localStorage.getItem("username");
    if (!token) { alert("Please login first!"); window.location.href = "login2.html"; }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      window.location.href = "login2.html";
    }

    function getInitials(name) {
      if (!name) return "?";
      return name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2);
    }

    window.onload = async function () {
      try {
        const response = await fetch("https://blogsphere-backend-al6x.onrender.com/blogs");
        const posts = await response.json();
        const postsDiv = document.querySelector(".post-container");

        posts.forEach(post => {
          const postHTML = `
            <div class="post-card" data-id="${post._id}">
              <div class="post-user">
                <div class="post-avatar">${getInitials(username)}</div>
                <div class="post-meta">
                  <span class="post-username">${username}</span>
                  <span class="post-date">${new Date(post.createdAt).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" })}</span>
                </div>
              </div>
              ${post.imageUrl ? `<div class="post-img"><img src="${post.imageUrl}" alt="Post image"></div>` : ""}
              <div class="post-body">
                <div class="post-title">${post.title}</div>
                <div class="post-content">${post.content}</div>
                <div class="post-actions">
                  <button class="action-btn" onclick="likePost(this)">❤ Like <span class="like-count">0</span></button>
                  <button class="action-btn" onclick="toggleComment(this)">💬 Comment</button>
                </div>
                <div class="comments-section">
                  <div class="existing-comments"></div>
                  <input type="text" class="comment-input" placeholder="Write a comment...">
                  <button class="add-comment-btn" onclick="addComment(this)">Post</button>
                </div>
              </div>
            </div>
          `;
          postsDiv.insertAdjacentHTML("beforeend", postHTML);
        });
      } catch (error) {
        document.querySelector(".post-container").innerHTML =
          "<p style='text-align:center; color:#993556; padding:40px;'>Could not load posts. Is the backend running?</p>";
      }
    };

    function likePost(btn) {
      const span = btn.querySelector(".like-count");
      span.innerText = parseInt(span.innerText) + 1;
    }

    function toggleComment(btn) {
      const section = btn.closest(".post-body").querySelector(".comments-section");
      section.style.display = section.style.display === "none" || section.style.display === "" ? "block" : "none";
    }

    function addComment(btn) {
      const section = btn.closest(".comments-section");
      const input = section.querySelector(".comment-input");
      const text = input.value.trim();
      if (!text) return;
      const p = document.createElement("p");
      p.innerText = text;
      section.querySelector(".existing-comments").appendChild(p);
      input.value = "";
    }

    function searchPosts() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      document.querySelectorAll(".post-card").forEach(post => {
        post.style.display = post.innerText.toLowerCase().includes(input) ? "block" : "none";
      });
    }
  </script>
</body>
</html>
