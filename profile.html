<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Profile Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #e26ad6;
            background-image: url(backgroundpic1.jpeg);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: pageFade 1s ease forwards;
        }

        .profile-container {
            background: #f47575;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            width: 350px;
            text-align: center;
            padding: 20px;
             animation: cardRise 0.9s ease forwards;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .profile-picture {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto;
            border: 3px solid #007bff;
            animation: floatPic 3s ease-in-out infinite,
               glowRing 2s ease-in-out infinite alternate;
        }

        .profile-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.5em;
            font-weight: 700;
            margin: 15px 0;
            color: #333;
            animation: slideFadeText 0.8s ease forwards;
        }

        .profile-bio {
            font-size: 0.9em;
            color: #150101;
            margin-bottom: 20px;
            line-height: 1.5;
                animation: fadeOnly 1.2s ease forwards;

        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .social-links a {
            text-decoration: none;
            color: #f1eeee;
            background-color: #007bff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            transition: background-color 0.3s ease;
        }

        .social-links a:hover {
            background-color: #0056b3;
             transform: translateY(-4px) scale(1.05);
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .social-links a::after {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 120%;
    height: 100%;
    background: rgba(255,255,255,0.35);
    transition: 0.5s;
}

.social-links a:hover::after {
    left: 120%;
}

/* ===== KEYFRAMES ===== */

@keyframes pageFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes cardRise {
    from {
        opacity: 0;
        transform: translateY(50px) scale(0.9);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes floatPic {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes glowRing {
    from { box-shadow: 0 0 10px rgba(0,123,255,0.4); }
    to { box-shadow: 0 0 25px rgba(0,123,255,0.8); }
}

@keyframes slideFadeText {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes fadeOnly {
    from { opacity: 0; }
    to { opacity: 1; }
}
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-picture">
            <img src="prof4.png" alt="Profile Picture">
        </div>
        <div class="profile-name">Nausheen</div>
        <div class="profile-bio">
            Blogger, coffee enthusiast, and tech lover. Sharing my thoughts and experiences one post at a time.
        </div>
        <div class="social-links">
            <a href="#">Twitter</a>
            <a href="https://www.linkedin.com/in/nausheen-waseem-32365b308?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app">LinkedIn</a>
            <a href="#">GitHub</a>
        </div>
    </div>
</body>
</html>
