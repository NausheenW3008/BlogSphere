<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(160deg, #F4C0D1 0%, #FAEEDA 100%);
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: #FBEAF0;
  border-radius: 16px;
  padding: 36px 32px;
  width: 340px;
  border: 1px solid #ED93B1;
  box-shadow: 0 8px 32px rgba(212,83,126,0.15);
}

h2 {
  text-align: center;
  color: #72243E;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 16px;
}

.input-group input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1.5px solid #ED93B1;
  background: #F4C0D1;
  color: #72243E;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(90deg, #D4537E, #EF9F27);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.bottom-link {
  text-align: center;
  margin-top: 15px;
}
.bottom-link a {
  color: #D4537E;
  text-decoration: none;
}
</style>
</head>

<body>
<div class="card">
  <h2>Reset Password 🔑</h2>

  <form id="resetForm">
    <div class="input-group">
      <input type="password" id="password" placeholder="Enter new password" required>
    </div>

    <button class="btn">Reset Password</button>
  </form>

  <div class="bottom-link">
    <a href="login2.html">Back to Login</a>
  </div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get("token");

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const password = document.getElementById("password").value;

  const res = await fetch(`http://localhost:5000/auth/reset-password/${token}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Password reset successful! Redirecting...");
    window.location.href = "login2.html"; // 👈 redirect
  } else {
    alert(data.error);
  }
});
</script>

</body>
</html>
